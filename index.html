<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#18181b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life OS">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Life OS</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f6f3;color:#18181b;min-height:100%;display:flex;flex-direction:column}
#login{position:fixed;inset:0;background:#f7f6f3;display:flex;align-items:center;justify-content:center;z-index:999}
.login-card{background:#fff;border-radius:22px;padding:2.5rem;max-width:380px;width:90%;border:0.5px solid #e4e4e7;text-align:center}
.login-logo{font-family:Georgia,serif;font-size:28px;font-weight:400;margin-bottom:6px}
.login-sub{font-size:14px;color:#71717a;margin-bottom:2rem;line-height:1.6}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:#fff;border:1px solid #e4e4e7;border-radius:12px;padding:13px;font-size:14px;font-family:inherit;cursor:pointer;font-weight:500;color:#18181b;transition:background .15s}
.google-btn:hover{background:#f7f6f3}
.google-btn svg{width:20px;height:20px;flex-shrink:0}
.topbar{background:#fff;border-bottom:0.5px solid #e4e4e7;padding:0 1.5rem;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:10}
.topbar-logo{font-family:Georgia,serif;font-size:16px;font-weight:400}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-date{font-size:12px;color:#a1a1aa}
.out-btn{background:none;border:0.5px solid #e4e4e7;border-radius:7px;padding:4px 10px;font-size:11px;color:#a1a1aa;cursor:pointer;font-family:inherit}
.out-btn:hover{background:#f4f4f5;color:#18181b}
.scroll{flex:1;overflow-y:auto;padding:1.5rem 1.5rem 8rem;-webkit-overflow-scrolling:touch}
.inner{max-width:1100px;margin:0 auto}
.gr{font-family:Georgia,serif;font-size:24px;font-weight:400;letter-spacing:-.4px;margin-bottom:3px}
.ds{font-size:13px;color:#a1a1aa;margin-bottom:1.3rem}
.upcom{background:#fef2f2;border:0.5px solid #fca5a5;border-radius:11px;padding:9px 14px;margin-bottom:1rem;display:flex;gap:9px;align-items:flex-start}
.upcom-dot{width:7px;height:7px;border-radius:50%;background:#dc2626;flex-shrink:0;margin-top:4px}
.upcom-txt{font-size:13px;color:#991b1b}
.cal-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-nav{display:flex;align-items:center;gap:7px}
.cal-ttl{font-size:13px;font-weight:500;min-width:150px;text-align:center}
.carr{background:none;border:0.5px solid #e4e4e7;border-radius:7px;padding:3px 10px;cursor:pointer;font-size:12px;color:#71717a;font-family:inherit}
.carr:hover{background:#f4f4f5}
.cv-row{display:flex;border:0.5px solid #e4e4e7;border-radius:9px;overflow:hidden}
.cv{background:none;border:none;padding:5px 12px;font-size:11px;font-weight:500;cursor:pointer;color:#71717a;font-family:inherit}
.cv.on{background:#18181b;color:#fff}
.mg-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.dow{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#a1a1aa;text-align:center;padding:3px 0}
.mdc{background:#fff;border:0.5px solid #e4e4e7;border-radius:8px;padding:5px;min-height:44px;cursor:pointer}
.mdc:hover:not(.noev){border-color:#a1a1aa}
.mdc.today{background:#18181b;border-color:transparent}
.mdc.faded{opacity:.15;pointer-events:none}
.mdc.noev{cursor:default}
.mdn{font-size:11px;font-weight:500}
.mdc.today .mdn{color:#fff}
.mdev-r{font-size:8px;color:#047857;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-top:2px;line-height:1.3}
.mdev-c{font-size:8px;color:#be185d;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-top:1px;line-height:1.3}
.mdc.today .mdev-r,.mdc.today .mdev-c{color:rgba(255,255,255,.75)}
.wk-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.wdc{background:#fff;border:0.5px solid #e4e4e7;border-radius:11px;padding:7px 8px;min-height:56px;cursor:pointer}
.wdc:hover{border-color:#a1a1aa}
.wdc.today{background:#18181b;border-color:transparent}
.wdn{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#a1a1aa;margin-bottom:1px}
.wdd{font-size:10px;color:#a1a1aa;margin-bottom:4px}
.wdc.today .wdn,.wdc.today .wdd{color:rgba(255,255,255,.38)}
.wdev-r{font-size:9px;line-height:1.4;color:#71717a}
.wdev-c{font-size:9px;line-height:1.4;color:#be185d}
.wdc.today .wdev-r{color:rgba(255,255,255,.82)}
.wdc.today .wdev-c{color:rgba(255,200,200,.9)}
.day-card{background:#fff;border:0.5px solid #e4e4e7;border-radius:13px;padding:14px 16px}
.day-ttl{font-size:14px;font-weight:500;margin-bottom:10px}
.day-ev{display:flex;gap:9px;padding:7px 0;border-bottom:0.5px solid #f4f4f5}
.day-ev:last-of-type{border-bottom:none}
.day-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.rec-dot{background:#047857}
.cus-dot{background:#be185d}
.day-txt{font-size:13px;line-height:1.45}
.day-empty{font-size:13px;color:#a1a1aa;text-align:center;padding:10px 0}
.day-notes{border-top:0.5px solid #e4e4e7;margin-top:12px;padding-top:12px}
.dnlbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#a1a1aa;margin-bottom:7px}
.dv{height:0.5px;background:#e4e4e7;margin:1.5rem 0}
.sl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#a1a1aa;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.slcnt{background:#f4f4f5;border-radius:7px;padding:2px 8px;font-size:10px;letter-spacing:0;color:#71717a;font-weight:500}
.slbtn{background:none;border:0.5px solid #e4e4e7;border-radius:7px;padding:4px 10px;font-size:11px;color:#71717a;cursor:pointer;font-family:inherit}
.slbtn:hover{background:#f4f4f5}
.fw{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.4rem}
.fcard{background:#18181b;border-radius:13px;padding:14px 17px}
.fcat{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.25);margin-bottom:7px}
.ftxt{font-size:14px;color:#fff;line-height:1.5;font-family:Georgia,serif}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.col-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.proj-g{margin-bottom:10px}
.pl{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pnm{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#71717a}
.tcard{background:#fff;border:0.5px solid #e4e4e7;border-radius:12px;overflow:hidden}
.ti{display:flex;align-items:flex-start;gap:8px;padding:8px 11px;border-bottom:0.5px solid #f9f9f8;cursor:pointer;border-left:4px solid transparent}
.ti:last-of-type{border-bottom:none}
.ti:hover{background:#fafaf9}
.ti.purgent{border-left-color:#dc2626;background:#fef9f9}
.ti.purgent:hover{background:#fef2f2}
.ti.phi{border-left-color:#ef4444}
.ti.pmed{border-left-color:#f59e0b}
.ti.plo{border-left-color:#86efac}
.ti.psom{border-left-color:#e4e4e7;opacity:.5}
.ti input[type=checkbox]{width:14px;height:14px;margin-top:2px;flex-shrink:0;cursor:pointer;accent-color:#18181b}
.tit{font-size:12px;flex:1;line-height:1.5;word-break:break-word}
.tit.dn{text-decoration:line-through;color:#d4d4d8}
.exp-p{padding:12px 13px;background:#fafaf9;border-bottom:0.5px solid #e4e4e7}
.exp-ta{width:100%;border:0.5px solid #d4d4d8;border-radius:9px;padding:9px 11px;font-size:13px;font-family:inherit;resize:vertical;outline:none;background:#fff;color:#18181b;line-height:1.55;min-height:90px}
.exp-ta:focus{border-color:#a1a1aa}
.exp-ta.xl{min-height:120px}
.pri-row{display:flex;gap:4px;margin-top:9px;flex-wrap:wrap;align-items:center}
.pri-lbl{font-size:11px;color:#71717a;flex-shrink:0;margin-right:2px}
.pb{border:none;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500;opacity:.32}
.pb.on{opacity:1}
.purg-b{background:#fef2f2;color:#991b1b}
.phi-b{background:#fff1f2;color:#be123c}
.pmed-b{background:#fffbeb;color:#92400e}
.plo-b{background:#f0fdf4;color:#166534}
.psom-b{background:#f4f4f5;color:#71717a}
.exp-dt{font-size:11px;color:#a1a1aa;margin-top:7px}
.sv-btn{background:#18181b;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:inherit;margin-top:9px}
.sv-btn:hover{opacity:.8}
.no-t{background:#fff;border:0.5px solid #e4e4e7;border-radius:12px;padding:13px;text-align:center;font-size:12px;color:#a1a1aa}
.bg-cols{columns:2;column-gap:11px}
.bc{background:#fff;border:0.5px solid #e4e4e7;border-radius:13px;padding:14px 16px;border-top:3px solid;break-inside:avoid;margin-bottom:11px;cursor:pointer}
.bc:hover{border-color:#a1a1aa}
.bc.active{border-top-color:#be185d}
.bc.future{border-top-color:#7c3aed}
.bc.background{border-top-color:#e4e4e7}
.bc-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;margin-bottom:7px}
.bc.active .bc-tag{color:#be185d}
.bc.future .bc-tag{color:#7c3aed}
.bc.background .bc-tag{color:#a1a1aa}
.bc-title{font-size:14px;font-weight:600;line-height:1.35;margin-bottom:7px;color:#18181b}
.bc-desc{font-size:13px;color:#71717a;line-height:1.6}
.bc-exp{margin-top:12px;padding-top:12px;border-top:0.5px solid #e4e4e7}
.st-row{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap}
.stb{border:none;border-radius:6px;padding:4px 9px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500;opacity:.32}
.stb.on{opacity:1}
.st-a{background:#fdf2f8;color:#9d174d}
.st-f{background:#f5f3ff;color:#5b21b6}
.st-b{background:#f4f4f5;color:#71717a}
.lg{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:9px}
.lc{background:#fff;border:0.5px solid #e4e4e7;border-radius:13px;padding:13px 15px;border-left:3px solid #047857;cursor:pointer}
.lc:hover{border-color:#a1a1aa}
.lsk{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#047857;margin-bottom:8px}
.lnum{font-size:28px;font-weight:600;line-height:1;margin-bottom:3px;color:#18181b}
.lnum.z{font-size:18px;color:#a1a1aa}
.lunit{font-size:11px;color:#a1a1aa;margin-bottom:8px}
.lnote{font-size:12px;color:#71717a;line-height:1.55;border-top:0.5px solid #f4f4f5;padding-top:8px}
.l-exp{margin-top:10px;padding-top:10px;border-top:0.5px solid #e4e4e7}
.idea-list{display:flex;flex-direction:column;gap:7px}
.ic{background:#fff;border:0.5px solid #e4e4e7;border-radius:12px;padding:12px 14px;display:flex;gap:11px;cursor:pointer}
.ic:hover{border-color:#a1a1aa}
.ic-dot{width:7px;height:7px;border-radius:50%;background:#5b21b6;flex-shrink:0;margin-top:5px}
.ict{font-size:13px;font-weight:600;margin-bottom:3px;line-height:1.3;color:#18181b}
.icd{font-size:12px;color:#71717a;line-height:1.6}
.icdt{font-size:11px;color:#d4d4d8;margin-top:4px}
.i-exp{margin-top:9px;padding-top:9px;border-top:0.5px solid #e4e4e7;width:100%}
.nl{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.nc{background:#fff;border:0.5px solid #e4e4e7;border-radius:12px;padding:12px 14px;border-left:3px solid #d4d4d8;cursor:pointer}
.nc:hover{border-color:#a1a1aa}
.nct{font-size:13px;font-weight:600;color:#18181b;margin-bottom:3px}
.ncb{font-size:12px;color:#71717a;line-height:1.6}
.n-exp{margin-top:9px;padding-top:9px;border-top:0.5px solid #e4e4e7}
.inp-e{width:100%;border:0.5px solid #d4d4d8;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;background:#fff;color:#18181b;margin-bottom:7px;display:block}
.inp-e:focus{border-color:#a1a1aa}
.save-ind{position:fixed;top:60px;right:16px;background:#18181b;color:#fff;font-size:11px;padding:4px 10px;border-radius:7px;opacity:0;transition:opacity .3s;z-index:20;pointer-events:none}
.save-ind.show{opacity:1}
.btm{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #e4e4e7;padding:10px 1.5rem env(safe-area-inset-bottom,12px);z-index:10}
.btm-inner{max-width:1100px;margin:0 auto;display:flex;gap:8px;align-items:flex-end}
.btm-ta{flex:1;border:1px solid #e4e4e7;border-radius:12px;padding:9px 13px;font-size:13px;font-family:inherit;outline:none;resize:none;min-height:40px;max-height:90px;overflow-y:auto;color:#18181b;background:#fafaf9;line-height:1.5}
.btm-ta::placeholder{color:#a1a1aa}
.btm-ta:focus{border-color:#18181b;background:#fff}
.btm-btn{background:#18181b;color:#fff;border:none;border-radius:10px;padding:9px 18px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:500;white-space:nowrap;flex-shrink:0}
.btm-btn:hover{opacity:.8}
.btm-btn:disabled{opacity:.35;cursor:not-allowed}
.btm-st{max-width:1100px;margin:4px auto 0;font-size:11px;color:#a1a1aa;text-align:right;min-height:14px}
.btm-st.ok{color:#047857;font-weight:500}
.btm-st.er{color:#dc2626}
@media(max-width:680px){.tgrid,.fw,.bg-cols{grid-template-columns:1fr}.bg-cols{columns:1}.wk-grid{gap:3px}.wdn{font-size:8px}.wdev-r,.wdev-c{font-size:8px}}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login">
  <div class="login-card">
    <div class="login-logo">Life OS</div>
    <div class="login-sub">Your personal command center.<br>Sign in to access your data on any device.</div>
    <button class="google-btn" onclick="signInWithGoogle()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar" id="topbar" style="display:none">
  <div class="topbar-logo">Life OS</div>
  <div class="topbar-right">
    <div class="topbar-date" id="top-date"></div>
    <button class="out-btn" onclick="doSignOut()">Sign out</button>
  </div>
</div>

<!-- SAVE INDICATOR -->
<div class="save-ind" id="save-ind">Saved</div>

<!-- MAIN SCROLL -->
<div class="scroll" id="scroll" style="display:none">
<div class="inner">
  <div class="gr" id="gr"></div>
  <div class="ds" id="ds"></div>
  <div id="upcom-area"></div>
  <div class="cal-bar">
    <div class="cal-nav">
      <button class="carr" onclick="calNav(-1)">&#8592;</button>
      <div class="cal-ttl" id="cal-ttl"></div>
      <button class="carr" onclick="calNav(1)">&#8594;</button>
    </div>
    <div class="cv-row">
      <button class="cv" onclick="setCV('month')">Month</button>
      <button class="cv" onclick="setCV('week')">Week</button>
      <button class="cv" onclick="setCV('day')">Day</button>
    </div>
  </div>
  <div id="cal" style="margin-bottom:1.4rem"></div>
  <div class="dv"></div>
  <div class="sl"><span>Today's growth focus</span><button class="slbtn" onclick="doRefreshFocus()">New focus</button></div>
  <div class="fw" id="fw"></div>
  <div class="dv"></div>
  <div id="tasks-sec"></div>
  <div class="dv"></div>
  <div class="sl" id="build-lbl">Building</div>
  <div class="bg-cols" id="builds"></div>
  <div class="dv"></div>
  <div class="sl">Learning journey</div>
  <div class="lg" id="learn"></div>
  <div class="dv"></div>
  <div class="sl" id="idea-lbl">Ideas</div>
  <div class="idea-list" id="ideas"></div>
  <div class="dv"></div>
  <div class="sl" id="note-lbl">Knowledge vault</div>
  <div class="nl" id="notes"></div>
  <div style="height:1rem"></div>
</div>
</div>

<!-- BOTTOM AI BAR -->
<div class="btm" id="btm" style="display:none">
  <div class="btm-inner">
    <textarea class="btm-ta" id="ai-ta" rows="1" placeholder="Tell me what's going on..."
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,90)+'px'"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();doUpdate()}"></textarea>
    <button class="btm-btn" id="btm-btn" onclick="doUpdate()">Update ↗</button>
  </div>
  <div class="btm-st" id="btm-st"></div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PASTE YOUR FIREBASE CONFIG HERE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const firebaseConfig = {
  apiKey: "AIzaSyBd0S9QjcBigTAplgVZW-JsNdoA4h50F8M",
  authDomain: "life-os-a25bc.firebaseapp.com",
  projectId: "life-os-a25bc",
  storageBucket: "life-os-a25bc.firebasestorage.app",
  messagingSenderId: "225197303106",
  appId: "1:225197303106:web:6cc30b302e4cf924e754db"
};
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// ANTHROPIC API KEY (stored locally on each device)
const ANTHROPIC_KEY_STORAGE = 'lifeos_anthropic_key';
function getApiKey(){return localStorage.getItem(ANTHROPIC_KEY_STORAGE);}

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let saveTimer = null;
let saveInd = null;

// Auth state listener
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    document.getElementById('login').style.display = 'none';
    document.getElementById('topbar').style.display = 'flex';
    document.getElementById('scroll').style.display = 'block';
    document.getElementById('btm').style.display = 'block';

// LOAD from Firestore
async function loadData(){
  try {
    const doc = await db.collection('users').doc(currentUser.uid).collection('data').doc('main').get();
    if(doc.exists){
      const d = doc.data();
      S.tasks = d.tasks || [];
      S.builds = d.builds || [];
      S.learning = d.learning || [];
      S.ideas = d.ideas || [];
      S.notes = d.notes || [];
      S.customEvents = d.customEvents || [];
      S.dayNotes = d.dayNotes || {};
      if(!getApiKey()&&d.anthropicKey)localStorage.setItem(ANTHROPIC_KEY_STORAGE,d.anthropicKey);
    } else {
      seed();
    }
    render();
    if(!getApiKey()) promptApiKey();
  } catch(e){console.error('Load error',e);}
}

// SAVE to Firestore (debounced 1.5s)
function svAll(){
  if(!currentUser) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try {
      await db.collection('users').doc(currentUser.uid).collection('data').doc('main').set({
        tasks: S.tasks, builds: S.builds, learning: S.learning,
        ideas: S.ideas, notes: S.notes, customEvents: S.customEvents||[],
        dayNotes: S.dayNotes||{}, updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      if(saveInd){saveInd.classList.add('show');setTimeout(()=>saveInd.classList.remove('show'),1500);}
    } catch(e){console.error('Save error',e);}
  }, 1500);
}

function promptApiKey(){
  const k = prompt('Enter your Anthropic API key to enable the AI update bar (get one free at console.anthropic.com → API Keys):');

  }
}

    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    const ch=JSON.parse((data.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim());
    applyChanges(ch);
    st.className='btm-st ok';st.textContent=ch.message||'Done!';
    ta.value='';ta.style.height='auto';
    setTimeout(()=>{st.textContent='';st.className='btm-st';},7000);
  }catch(e){st.className='btm-st er';st.textContent='Error: '+e.message;}
  btn.disabled=false;btn.textContent='Update ↗';
}

function applyChanges(ch){
  if(ch.addTasks?.length)ch.addTasks.forEach(t=>S.tasks.push({id:uid(),text:t.text,area:t.area||'personal',project:t.project||'gen',priority:t.priority||'lo',done:false,date:tod()}));
  if(ch.completeTasks?.length)ch.completeTasks.forEach(r=>{const t=S.tasks.find(x=>x.text.toLowerCase().includes((r||'').toLowerCase()));if(t)t.done=true;});
  if(ch.removeTasks?.length)ch.removeTasks.forEach(r=>{const t=S.tasks.find(x=>x.text.toLowerCase().includes((r||'').toLowerCase()));if(t)S.tasks=S.tasks.filter(x=>x.id!==t.id);});
  if(ch.addBuild?.length)ch.addBuild.forEach(b=>S.builds.push({id:uid(),title:b.title,desc:b.desc||'',status:b.status||'future',date:tod()}));
  if(ch.logLearning?.length)ch.logLearning.forEach(lg=>{let l=S.learning.find(x=>x.skill.toLowerCase().includes((lg.skill||'').toLowerCase()));if(!l){l={id:uid(),skill:lg.skill,streak:0,lastDate:null,total:0,note:'',entries:[]};S.learning.push(l);}if(lg.type==='session')bump(l);l.entries=l.entries||[];if(lg.content)l.entries.push({date:tod(),content:lg.content});});
  if(ch.addIdea?.length)ch.addIdea.forEach(i=>S.ideas.push({id:uid(),title:i.title,desc:i.desc||'',date:tod()}));
  if(ch.addNote?.length)ch.addNote.forEach(n=>S.notes.push({id:uid(),title:n.title,body:n.body,date:tod()}));
  if(ch.addEvent?.length){S.customEvents=S.customEvents||[];ch.addEvent.forEach(e=>S.customEvents.push({id:uid(),date:e.date,time:e.time||'',title:e.title}));}
  svAll();render();
}

function render(){
  const g=document.getElementById('gr'),d=document.getElementById('ds'),td=document.getElementById('top-date');
  if(g)g.textContent=gTxt();if(d)d.textContent=dTxt();if(td)td.textContent=dTxt();
  rUpcom();rCal();rFocus();rTasks();rBuilds();rLearn();rIdeas();rNotes();
}
