<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#18181b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life OS">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Life OS</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f6f3;color:#18181b;min-height:100%;display:flex;flex-direction:column;font-size:15px}
#login{position:fixed;inset:0;background:#f7f6f3;display:flex;align-items:center;justify-content:center;z-index:999;padding:1rem}
.lc{background:#fff;border-radius:22px;padding:2.5rem 2rem;max-width:360px;width:100%;border:0.5px solid #e4e4e7;text-align:center}
.l-logo{font-family:Georgia,serif;font-size:30px;margin-bottom:5px}
.l-sub{font-size:14px;color:#71717a;margin-bottom:2rem;line-height:1.6}
.g-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:#fff;border:1.5px solid #e4e4e7;border-radius:13px;padding:14px;font-size:14px;font-family:inherit;cursor:pointer;font-weight:500;color:#18181b}
.g-btn:hover{background:#f7f6f3}
.g-btn svg{width:20px;height:20px;flex-shrink:0}
.topbar{background:#fff;border-bottom:0.5px solid #e4e4e7;padding:0 1.25rem;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:10}
.t-logo{font-family:Georgia,serif;font-size:17px}
.t-right{display:flex;align-items:center;gap:8px}
.t-date{font-size:12px;color:#a1a1aa}
.s-btn{background:none;border:0.5px solid #e4e4e7;border-radius:7px;padding:5px 11px;font-size:12px;color:#a1a1aa;cursor:pointer;font-family:inherit}
.s-btn:hover{background:#f4f4f5;color:#18181b}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1.25rem 1rem 8rem}
.inn{max-width:1140px;margin:0 auto}
.si{position:fixed;top:60px;right:14px;background:#18181b;color:#fff;font-size:11px;padding:5px 12px;border-radius:8px;opacity:0;transition:opacity .3s;z-index:20;pointer-events:none}
.si.show{opacity:1}
.gr{font-family:Georgia,serif;font-size:24px;font-weight:400;letter-spacing:-.4px;margin-bottom:2px}
.ds{font-size:13px;color:#a1a1aa;margin-bottom:1.2rem}
.upcom{background:#fef2f2;border:0.5px solid #fca5a5;border-radius:11px;padding:9px 14px;margin-bottom:.75rem;display:flex;gap:9px}
.upcom-dot{width:7px;height:7px;border-radius:50%;background:#dc2626;flex-shrink:0;margin-top:5px}
.upcom-txt{font-size:13px;color:#991b1b;line-height:1.4}
/* DAILY NOTE */
.dn-wrap{background:#fff;border:0.5px solid #e4e4e7;border-radius:14px;padding:14px 16px;margin-bottom:1.2rem}
.dn-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#a1a1aa;margin-bottom:8px}
.dn-ta{width:100%;border:none;background:transparent;font-size:14px;font-family:Georgia,serif;resize:none;outline:none;line-height:1.7;color:#18181b;min-height:72px}
.dn-ta::placeholder{color:#d4d4d8}
.dn-save{background:#18181b;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:inherit;margin-top:8px}
.dn-save:hover{opacity:.8}
/* CALENDAR */
.cal-wrap{background:#fff;border:0.5px solid #e4e4e7;border-radius:16px;overflow:hidden;margin-bottom:1.2rem}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:0.5px solid #f0f0ee}
.cal-nav{display:flex;align-items:center;gap:6px}
.cal-ttl{font-size:14px;font-weight:600;min-width:150px;text-align:center}
.carr{background:none;border:0.5px solid #e4e4e7;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:14px;color:#71717a;font-family:inherit;display:flex;align-items:center;justify-content:center}
.carr:hover{background:#f4f4f5}
.cv-row{display:flex;border:0.5px solid #e4e4e7;border-radius:9px;overflow:hidden}
.cv{background:none;border:none;padding:6px 11px;font-size:12px;font-weight:500;cursor:pointer;color:#71717a;font-family:inherit}
.cv.on{background:#18181b;color:#fff}
/* MONTH */
.mg{display:grid;grid-template-columns:repeat(7,1fr)}
.mdow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#a1a1aa;text-align:center;padding:9px 0 7px;border-bottom:0.5px solid #f0f0ee}
.mc{border-right:0.5px solid #f0f0ee;border-bottom:0.5px solid #f0f0ee;padding:5px 6px;min-height:76px;cursor:pointer;transition:background .1s}
.mc:hover:not(.faded):not(.noev){background:#fafaf9}
.mc:nth-child(7n){border-right:none}
.mc.faded{opacity:.18;pointer-events:none}
.mc.today{background:#18181b}
.mc.noev{cursor:default}
.mn{font-size:12px;font-weight:500;color:#18181b;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:3px}
.mc.today .mn{color:#fff}
.mc.wkend .mn{color:#a1a1aa}
.mev{font-size:8px;font-weight:500;padding:2px 4px;border-radius:3px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.4}
.mev.rec{background:#d1fae5;color:#065f46}
.mev.cus{background:#fce7f3;color:#9d174d}
.mev.gcal{background:#dbeafe;color:#1e40af}
.mc.today .mev.rec,.mc.today .mev.cus,.mc.today .mev.gcal{background:rgba(255,255,255,.2);color:rgba(255,255,255,.9)}
/* WEEK */
.wg{display:grid;grid-template-columns:repeat(7,1fr);border-top:0.5px solid #f0f0ee}
.wc{padding:9px 7px;border-right:0.5px solid #f0f0ee;min-height:76px;cursor:pointer;transition:background .1s}
.wc:last-child{border-right:none}
.wc:hover{background:#fafaf9}
.wc.today{background:#18181b}
.wdn{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#a1a1aa;margin-bottom:1px}
.wdd{font-size:17px;font-weight:600;color:#18181b;margin-bottom:5px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.wc.today .wdn,.wc.today .wdd{color:rgba(255,255,255,.45)}
.wc.today .wdd{color:#fff}
.wev{font-size:9px;font-weight:500;padding:2px 5px;border-radius:4px;margin-bottom:2px;line-height:1.35}
.wev.rec{background:#d1fae5;color:#065f46}
.wev.cus{background:#fce7f3;color:#9d174d}
.wev.gcal{background:#dbeafe;color:#1e40af}
.wc.today .wev.rec,.wc.today .wev.cus,.wc.today .wev.gcal{background:rgba(255,255,255,.18);color:rgba(255,255,255,.92)}
/* DAY */
.dv-wrap{padding:14px 16px}
.dv-ttl{font-size:16px;font-weight:600;margin-bottom:13px}
.dev-row{display:flex;gap:12px;padding:9px 0;border-bottom:0.5px solid #f4f4f5}
.dev-row:last-of-type{border-bottom:none}
.dev-time{font-size:12px;color:#a1a1aa;width:42px;flex-shrink:0;padding-top:3px;font-weight:500}
.dev-pill{flex:1;border-radius:9px;padding:8px 12px;font-size:13px;font-weight:500;line-height:1.4}
.dev-pill.rec{background:#d1fae5;color:#065f46}
.dev-pill.cus{background:#fce7f3;color:#9d174d}
.dev-pill.gcal{background:#dbeafe;color:#1e40af}
.dv-empty{font-size:14px;color:#a1a1aa;padding:16px 0;text-align:center}
.dv-notes{border-top:0.5px solid #f0f0ee;padding:13px 15px}
.dv-nlbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#a1a1aa;margin-bottom:7px}
/* SHARED */
.dv{height:0.5px;background:#e4e4e7;margin:1.2rem 0}
.sl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#a1a1aa;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px}
.slcnt{background:#f4f4f5;border-radius:7px;padding:2px 8px;font-size:10px;letter-spacing:0;color:#71717a;font-weight:500}
.slbtn{background:none;border:0.5px solid #e4e4e7;border-radius:7px;padding:4px 10px;font-size:11px;color:#71717a;cursor:pointer;font-family:inherit}
.slbtn:hover{background:#f4f4f5}
.exp-ta{width:100%;border:0.5px solid #d4d4d8;border-radius:9px;padding:9px 11px;font-size:13px;font-family:inherit;resize:vertical;outline:none;background:#fff;color:#18181b;line-height:1.55;min-height:90px}
.exp-ta:focus{border-color:#a1a1aa}
.exp-ta.xl{min-height:120px}
.inp-e{width:100%;border:0.5px solid #d4d4d8;border-radius:8px;padding:8px 11px;font-size:13px;font-family:inherit;outline:none;background:#fff;color:#18181b;margin-bottom:7px;display:block}
.inp-e:focus{border-color:#a1a1aa}
.sv-btn{background:#18181b;color:#fff;border:none;border-radius:8px;padding:7px 15px;font-size:12px;cursor:pointer;font-family:inherit;margin-top:9px}
.sv-btn:hover{opacity:.8}
.no-t{background:#fff;border:0.5px solid #e4e4e7;border-radius:12px;padding:14px;text-align:center;font-size:13px;color:#a1a1aa}
/* FOCUS CARDS */
.fw{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.2rem}
.fcard{background:#18181b;border-radius:14px;padding:15px 17px}
.fcat{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.25);margin-bottom:7px}
.ftxt{font-size:14px;color:#fff;line-height:1.5;font-family:Georgia,serif}
/* HABITS */
.hab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
.hab-card{background:#fff;border:0.5px solid #e4e4e7;border-radius:13px;padding:13px 14px;cursor:pointer;transition:border-color .15s}
.hab-card:hover{border-color:#a1a1aa}
.hab-card.done{background:#f0fdf4;border-color:#86efac}
.hab-name{font-size:13px;font-weight:500;color:#18181b;margin-bottom:4px}
.hab-streak{font-size:11px;color:#71717a;margin-bottom:10px}
.hab-card.done .hab-streak{color:#047857}
.hab-check{display:flex;align-items:center;gap:7px;font-size:13px;color:#71717a}
.hab-tick{width:22px;height:22px;border-radius:50%;border:1.5px solid #e4e4e7;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px}
.hab-card.done .hab-tick{background:#18181b;border-color:#18181b;color:#fff}
.hab-exp{margin-top:10px;padding-top:10px;border-top:0.5px solid #e4e4e7}
/* TASKS */
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.col-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px}
.proj-g{margin-bottom:10px}
.proj-hdr{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pnm{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#71717a}
.tcard{background:#fff;border:0.5px solid #e4e4e7;border-radius:12px;overflow:hidden}
.ti{display:flex;align-items:flex-start;gap:8px;padding:8px 11px;border-bottom:0.5px solid #f9f9f8;cursor:pointer;border-left:4px solid transparent;transition:background .1s}
.ti:last-of-type{border-bottom:none}
.ti:hover{background:#fafaf9}
.ti.purgent{border-left-color:#dc2626;background:#fef9f9}.ti.purgent:hover{background:#fef2f2}
.ti.phi{border-left-color:#ef4444}
.ti.pmed{border-left-color:#f59e0b}
.ti.plo{border-left-color:#86efac}
.ti.psom{border-left-color:#e4e4e7;opacity:.5}
.ti input[type=checkbox]{width:14px;height:14px;margin-top:2px;flex-shrink:0;cursor:pointer;accent-color:#18181b}
.tit{font-size:12px;flex:1;line-height:1.45;word-break:break-word}
.tit.dn{text-decoration:line-through;color:#d4d4d8}
.ti-time{font-size:10px;color:#a1a1aa;white-space:nowrap;flex-shrink:0;margin-top:3px}
.exp-p{padding:12px 13px;background:#fafaf9;border-bottom:0.5px solid #e4e4e7}
.pri-row{display:flex;gap:4px;margin-top:9px;flex-wrap:wrap;align-items:center}
.pri-lbl{font-size:11px;color:#71717a;flex-shrink:0;margin-right:2px}
.pb{border:none;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500;opacity:.32}
.pb.on{opacity:1}
.purg-b{background:#fef2f2;color:#991b1b}
.phi-b{background:#fff1f2;color:#be123c}
.pmed-b{background:#fffbeb;color:#92400e}
.plo-b{background:#f0fdf4;color:#166534}
.psom-b{background:#f4f4f5;color:#71717a}
.exp-dt{font-size:11px;color:#a1a1aa;margin-top:7px}
/* BUILDS */
.bg-cols{columns:2;column-gap:11px}
.bc{background:#fff;border:0.5px solid #e4e4e7;border-radius:14px;padding:14px 16px;border-top:3px solid;break-inside:avoid;margin-bottom:11px;cursor:pointer}
.bc:hover{border-color:#a1a1aa}
.bc.active{border-top-color:#be185d}
.bc.future{border-top-color:#7c3aed}
.bc.background{border-top-color:#e4e4e7}
.bc-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;margin-bottom:7px}
.bc.active .bc-tag{color:#be185d}
.bc.future .bc-tag{color:#7c3aed}
.bc.background .bc-tag{color:#a1a1aa}
.bc-title{font-size:14px;font-weight:600;line-height:1.35;margin-bottom:7px;color:#18181b}
.bc-desc{font-size:13px;color:#71717a;line-height:1.6}
.bc-exp{margin-top:12px;padding-top:12px;border-top:0.5px solid #e4e4e7}
.st-row{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap}
.stb{border:none;border-radius:6px;padding:4px 9px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500;opacity:.32}
.stb.on{opacity:1}
.st-a{background:#fdf2f8;color:#9d174d}
.st-f{background:#f5f3ff;color:#5b21b6}
.st-b{background:#f4f4f5;color:#71717a}
/* LEARNING */
.lg{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
.lc{background:#fff;border:0.5px solid #e4e4e7;border-radius:13px;padding:13px 14px;border-left:3px solid #047857;cursor:pointer}
.lc:hover{border-color:#a1a1aa}
.lsk{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#047857;margin-bottom:8px}
.lnum{font-size:28px;font-weight:600;line-height:1;margin-bottom:3px;color:#18181b}
.lnum.z{font-size:18px;color:#a1a1aa}
.lunit{font-size:11px;color:#a1a1aa;margin-bottom:8px}
.lnote{font-size:12px;color:#71717a;line-height:1.5;border-top:0.5px solid #f4f4f5;padding-top:8px}
.l-exp{margin-top:10px;padding-top:10px;border-top:0.5px solid #e4e4e7}
/* IDEAS */
.idea-list{display:flex;flex-direction:column;gap:8px}
.ic{background:#fff;border:0.5px solid #e4e4e7;border-radius:12px;padding:12px 14px;display:flex;gap:11px;cursor:pointer}
.ic:hover{border-color:#a1a1aa}
.ic-dot{width:7px;height:7px;border-radius:50%;background:#5b21b6;flex-shrink:0;margin-top:5px}
.ict{font-size:13px;font-weight:600;margin-bottom:3px;line-height:1.3;color:#18181b}
.icd{font-size:12px;color:#71717a;line-height:1.6}
.icdt{font-size:11px;color:#d4d4d8;margin-top:4px}
.i-exp{margin-top:9px;padding-top:9px;border-top:0.5px solid #e4e4e7;width:100%}
/* RESOURCES */
.res-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:9px}
.rc{background:#fff;border:0.5px solid #e4e4e7;border-radius:12px;padding:12px 14px;cursor:pointer;border-left:3px solid #0891b2}
.rc:hover{border-color:#a1a1aa}
.rc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
.rc-title{font-size:13px;font-weight:600;color:#18181b;line-height:1.3}
.rc-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:2px 6px;border-radius:4px;background:#e0f2fe;color:#075985;flex-shrink:0}
.rc-desc{font-size:12px;color:#71717a;line-height:1.5;margin-bottom:5px}
.rc-url{font-size:11px;color:#0891b2;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;text-decoration:none}
.rc-url:hover{text-decoration:underline}
.r-exp{margin-top:9px;padding-top:9px;border-top:0.5px solid #e4e4e7}
/* NOTES */
.nl{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:9px}
.nc{background:#fff;border:0.5px solid #e4e4e7;border-radius:12px;padding:12px 14px;border-left:3px solid #d4d4d8;cursor:pointer}
.nc:hover{border-color:#a1a1aa}
.nct{font-size:13px;font-weight:600;color:#18181b;margin-bottom:4px}
.ncb{font-size:12px;color:#71717a;line-height:1.6}
.n-exp{margin-top:9px;padding-top:9px;border-top:0.5px solid #e4e4e7}
/* BOTTOM BAR */
.btm{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #e4e4e7;padding:10px 1.25rem env(safe-area-inset-bottom,10px);z-index:10}
.btm-inn{max-width:1140px;margin:0 auto;display:flex;gap:8px;align-items:flex-end}
.btm-ta{flex:1;border:1.5px solid #e4e4e7;border-radius:13px;padding:10px 14px;font-size:14px;font-family:inherit;outline:none;resize:none;min-height:42px;max-height:90px;overflow-y:auto;color:#18181b;background:#fafaf9;line-height:1.45}
.btm-ta::placeholder{color:#a1a1aa}
.btm-ta:focus{border-color:#18181b;background:#fff}
.btm-btn{background:#18181b;color:#fff;border:none;border-radius:11px;padding:10px 18px;font-size:14px;font-family:inherit;cursor:pointer;font-weight:500;white-space:nowrap;flex-shrink:0}
.btm-btn:hover{opacity:.8}
.btm-btn:disabled{opacity:.35;cursor:not-allowed}
.btm-st{max-width:1140px;margin:4px auto 0;font-size:11px;color:#a1a1aa;text-align:right;min-height:14px}
.btm-st.ok{color:#047857;font-weight:500}
.btm-st.er{color:#dc2626}
/* RESPONSIVE */
@media(min-width:640px){.t-date{display:block}}
@media(min-width:768px){.scroll{padding:1.75rem 1.75rem 8rem}.gr{font-size:27px}}
@media(max-width:600px){
  .tgrid,.fw{grid-template-columns:1fr}
  .bg-cols{columns:1}
  .lg,.hab-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .res-list,.nl{grid-template-columns:1fr}
  .wg{grid-template-columns:repeat(7,1fr)}
  .wc{padding:6px 4px}
  .wdd{font-size:14px;width:24px;height:24px}
  .wev{font-size:8px;padding:1px 3px}
  .mc{min-height:54px;padding:4px}
  .mn{font-size:11px;width:18px;height:18px}
  .mev{font-size:7px}
  .cal-ttl{min-width:120px;font-size:13px}
}
</style>
</head>
<body>

<div id="login">
  <div class="lc">
    <div class="l-logo">Life OS</div>
    <div class="l-sub">Your personal command centre.<br>Sign in to access from any device.</div>
    <button class="g-btn" onclick="signInGoogle()">

function signInGoogle(){

async function ensureGTok(){
  if(gTok)return gTok;
  try{const s=sessionStorage.getItem('los_gat');if(s){gTok=s;return gTok;}}catch(e){}
  // Need fresh token — re-auth with calendar scope
  const p=new firebase.auth.GoogleAuthProvider();
  p.addScope('https://www.googleapis.com/auth/calendar');
  try{
    const r=await auth.currentUser.reauthenticateWithPopup(p);
    if(r.credential&&r.credential.accessToken){
      gTok=r.credential.accessToken;
      try{sessionStorage.setItem('los_gat',gTok);}catch(e){}
      return gTok;
    }
  }catch(e){console.warn('GCal re-auth failed',e);}
  return null;
}

async function fetchGCalEvents(startISO,endISO){
  const tok=await ensureGTok();
  if(!tok)return[];
  const url=`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(startISO)}&timeMax=${encodeURIComponent(endISO)}&singleEvents=true&orderBy=startTime&maxResults=100`;
  const r=await fetch(url,{headers:{Authorization:'Bearer '+tok}});
  if(r.status===401){gTok=null;try{sessionStorage.removeItem('los_gat');}catch(e){}return fetchGCalEvents(startISO,endISO);}
  if(!r.ok)return[];
  const data=await r.json();
  return(data.items||[]).map(ev=>({
    id:ev.id,title:ev.summary||'(No title)',
    date:(ev.start.dateTime||ev.start.date||'').slice(0,10),
    time:ev.start.dateTime?ev.start.dateTime.slice(11,16):'',
    allDay:!!ev.start.date,gcal:true
  }));
}

async function getGCalForView(y,m){
  const key=`${y}-${m}`;
  if(gCalEvCache.key===key)return gCalEvCache.events;
  const start=new Date(y,m,1).toISOString();
  const end=new Date(y,m+1,1).toISOString();
  const evs=await fetchGCalEvents(start,end);
  gCalEvCache={key,events:evs};
  return evs;
}

function parseTimeToHHMM(s){
  const m=(s||'').match(/(\d+)(?::(\d+))?\s*(am|pm)/i);
  if(!m)return'10:00';
  let h=parseInt(m[1]),min=parseInt(m[2]||'0');
  if(m[3].toLowerCase()==='pm'&&h!==12)h+=12;
  if(m[3].toLowerCase()==='am'&&h===12)h=0;
  return`${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
}

async function createGCalEvent(title,date,time,desc){
  const tok=await ensureGTok();if(!tok)return null;
  const tz='Africa/Johannesburg';
  let body;
  if(time){const hhmm=parseTimeToHHMM(time);const startDT=`${date}T${hhmm}:00`;const endDT=`${date}T${String(parseInt(hhmm.split(':')[0])+1).padStart(2,'0')}:${hhmm.split(':')[1]}:00`;body={summary:title,description:desc||'',start:{dateTime:startDT,timeZone:tz},end:{dateTime:endDT,timeZone:tz}};}
  else{body={summary:title,description:desc||'',start:{date},end:{date}};}
  const r=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{method:'POST',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(r.ok){gCalEvCache={key:'',events:[]};return await r.json();}
  return null;
}

function genFocus(t,off){const cats=Object.keys(GROWTH),h=t.split('').reduce((a,b)=>a+b.charCodeAt(0),0)+(off||0),i1=h%cats.length,i2=(h+3)%cats.length;const f=[{text:GROWTH[cats[i1]][h%GROWTH[cats[i1]].length],cat:cats[i1]},{text:GROWTH[cats[i2]][(h+1)%GROWTH[cats[i2]].length],cat:cats[i2]}];try{localStorage.setItem('lf_f',JSON.stringify({date:t,items:f,off:off||0}));}catch(e){}return f;}

function getCusDate(ds){return(S.customEvents||[]).filter(e=>e.date===ds);}
function getCusMon(y,m){return(S.customEvents||[]).filter(e=>{const d=new Date(e.date+'T12:00:00');return d.getFullYear()===y&&d.getMonth()===m;});}
function parseH(s){const m=(s||'').match(/(\d+)\s*(am|pm)/i);if(!m)return null;let h=parseInt(m[1]);if(m[2].toLowerCase()==='pm'&&h!==12)h+=12;if(m[2].toLowerCase()==='am'&&h===12)h=0;return h;}
function fmtH(h){if(h===null)return '';const ampm=h>=12?'pm':'am';const display=h>12?h-12:(h===0?12:h);return`${display}${ampm}`;}
function rUpcom(){const today=new Date(),out=[];const chk=(name,ts)=>{const h=parseH(ts);if(h===null)return;const s=new Date(today);s.setHours(h,0,0,0);const d=s-Date.now();if(d>0&&d<7200000){const m=Math.round(d/60000);out.push(m<60?`${name} in ${m} min`:`${name} in ~${Math.round(d/3600000)}h`);}};(SCHED[today.getDay()]||[]).forEach(e=>chk(e.split(' ')[0],e));getCusDate(tod()).forEach(e=>chk(e.title,e.time));document.getElementById('upcom-area').innerHTML=out.map(t=>`<div class="upcom"><span class="upcom-dot"></span><div class="upcom-txt">${esc(t)}</div></div>`).join('');}
function getCalTitle(){const d=UI.calDate;if(UI.calView==='month')return d.toLocaleDateString('en-ZA',{month:'long',year:'numeric'});if(UI.calView==='day')return d.toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long'});const s=new Date(d);s.setDate(d.getDate()-d.getDay());const e=new Date(s);e.setDate(s.getDate()+6);return`${s.getDate()} ${s.toLocaleDateString('en-ZA',{month:'short'})} – ${e.getDate()} ${e.toLocaleDateString('en-ZA',{month:'short'})}`;}

async function rCal(){
  document.getElementById('cal-ttl').textContent=getCalTitle();
  document.querySelectorAll('.cv').forEach((b,i)=>b.classList.toggle('on',['month','week','day'][i]===UI.calView));
  const el=document.getElementById('cal'),today=new Date();
  const y=UI.calDate.getFullYear(),m=UI.calDate.getMonth();
  // Fetch Google Calendar events for this month (cached)
  let gcEvs=[];
  try{gcEvs=await getGCalForView(y,m);}catch(e){console.warn('GCal fetch error',e);}
  const gcForDate=ds=>gcEvs.filter(e=>e.date===ds);

  if(UI.calView==='month'){
    const first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),cevs=getCusMon(y,m);
    let h='<div class="mg">'+['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="mdow">${d}</div>`).join('');
    for(let i=0;i<first;i++)h+=`<div class="mc faded"></div>`;
    for(let d=1;d<=days;d++){
      const dow=(first+d-1)%7,ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const re=SCHED[dow]||[],ce=cevs.filter(e=>e.date===ds),gc=gcForDate(ds);
      const isT=today.getDate()===d&&today.getMonth()===m&&today.getFullYear()===y,isW=dow===0||dow===6;
      const hasAny=re.length||ce.length||gc.length;
      h+=`<div class="mc${isT?' today':''}${isW?' wkend':''}${!hasAny?' noev':''}" data-cd="${y},${m},${d}">
        <div class="mn">${d}</div>
        ${re.map(e=>`<div class="mev rec">${esc(e)}</div>`).join('')}
        ${gc.slice(0,2).map(e=>`<div class="mev gcal">${esc(e.title)}</div>`).join('')}
        ${gc.length>2?`<div class="mev gcal">+${gc.length-2} more</div>`:''}
        ${ce.map(e=>`<div class="mev cus">${esc(e.title)}</div>`).join('')}
      </div>`;
    }
    el.innerHTML=h+'</div>';
    el.onclick=e=>{const c=e.target.closest('[data-cd]');if(!c)return;const[y,m,d]=c.dataset.cd.split(',').map(Number);UI.calDate=new Date(y,m,d);UI.calView='week';rCal();};

  } else if(UI.calView==='week'){
    const s=new Date(UI.calDate);s.setDate(UI.calDate.getDate()-UI.calDate.getDay());
    let h='<div class="wg">';
    for(let i=0;i<7;i++){
      const d=new Date(s);d.setDate(s.getDate()+i);
      const isT=d.toDateString()===today.toDateString(),re=SCHED[d.getDay()]||[];
      const ds=d.toISOString().slice(0,10),ce=getCusDate(ds),gc=gcForDate(ds);
      h+=`<div class="wc${isT?' today':''}" data-wi="${i}">
        <div class="wdn">${DAYS[d.getDay()]}</div><div class="wdd">${d.getDate()}</div>
        ${re.map(e=>`<div class="wev rec">${esc(e)}</div>`).join('')}
        ${gc.map(e=>`<div class="wev gcal">${esc(e.time?e.time.slice(0,5)+' ':'')}${esc(e.title)}</div>`).join('')}
        ${ce.map(e=>`<div class="wev cus">${esc((e.time?e.time+' ':'')+e.title)}</div>`).join('')}
      </div>`;
    }
    el.innerHTML=h+'</div>';
    el.onclick=e=>{const c=e.target.closest('[data-wi]');if(!c)return;const s2=new Date(UI.calDate);s2.setDate(UI.calDate.getDate()-UI.calDate.getDay());s2.setDate(s2.getDate()+parseInt(c.dataset.wi));UI.calDate=s2;UI.calView='day';rCal();};

  } else {
    const ds=UI.calDate.toISOString().slice(0,10);
    const re=SCHED[UI.calDate.getDay()]||[],ce=getCusDate(ds),gc=gcForDate(ds);
    const lbl=UI.calDate.toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    const note=(S.dayNotes||{})[ds]||'';
    const allEvs=[
      ...re.map(t=>({txt:t,cls:'rec',h:parseH(t)})),
      ...gc.map(e=>({txt:(e.time?e.time.slice(0,5)+' ':'')+e.title,cls:'gcal',h:e.time?parseInt(e.time.slice(0,2)):null})),
