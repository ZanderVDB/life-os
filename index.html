<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life OS">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Life OS</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#111;min-height:100%;display:flex;flex-direction:column}

/* LOGIN */
#login{position:fixed;inset:0;background:#f5f4f0;display:flex;align-items:center;justify-content:center;z-index:999;padding:1rem}
.lc{background:#fff;border-radius:24px;padding:2.5rem 2rem;max-width:360px;width:100%;border:0.5px solid #e5e5e3;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.l-logo{font-family:Georgia,serif;font-size:32px;font-weight:400;letter-spacing:-.5px;margin-bottom:4px;color:#111}
.l-sub{font-size:14px;color:#888;margin-bottom:2rem;line-height:1.6}
.g-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:#fff;border:1.5px solid #e5e5e3;border-radius:13px;padding:14px;font-size:14px;font-family:inherit;cursor:pointer;font-weight:500;color:#111;transition:background .15s}
.g-btn:hover{background:#f5f4f0}
.g-btn svg{width:20px;height:20px;flex-shrink:0}

/* TOPBAR */
.topbar{background:#fff;border-bottom:0.5px solid #e5e5e3;padding:0 1.25rem;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:10}
.t-logo{font-family:Georgia,serif;font-size:17px;font-weight:400;letter-spacing:-.2px;color:#111}
.t-right{display:flex;align-items:center;gap:8px}
.t-date{font-size:12px;color:#aaa}
.t-btn{background:none;border:0.5px solid #e5e5e3;border-radius:7px;padding:5px 10px;font-size:12px;color:#aaa;cursor:pointer;font-family:inherit}
.t-btn:hover{color:#111;border-color:#aaa}
.save-pill{position:fixed;top:58px;right:14px;background:#111;color:#fff;font-size:11px;padding:5px 12px;border-radius:20px;opacity:0;transition:opacity .3s;z-index:20;pointer-events:none}
.save-pill.show{opacity:1}

/* LAYOUT */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1.5rem 1.25rem 9rem}
.inn{max-width:1140px;margin:0 auto}
.gr{font-family:Georgia,serif;font-size:26px;font-weight:400;letter-spacing:-.5px;margin-bottom:2px;color:#111}
.ds{font-size:13px;color:#aaa;margin-bottom:1.25rem}

/* UPCOMING */
.upcom{background:#fef2f2;border:0.5px solid #fca5a5;border-radius:11px;padding:9px 14px;margin-bottom:.75rem;display:flex;gap:9px}
.u-dot{width:7px;height:7px;border-radius:50%;background:#dc2626;flex-shrink:0;margin-top:5px}
.u-txt{font-size:13px;color:#991b1b;line-height:1.4}

/* DAILY NOTE */
.dn-wrap{background:#fff;border:0.5px solid #e5e5e3;border-radius:14px;padding:14px 16px;margin-bottom:1.25rem}
.dn-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.dn-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#aaa}
.dn-date{font-size:11px;color:#ccc}
.dn-ta{width:100%;border:none;background:transparent;font-size:14px;font-family:Georgia,serif;resize:none;outline:none;line-height:1.75;color:#111;min-height:80px}
.dn-ta::placeholder{color:#ccc}
.dn-foot{display:flex;justify-content:flex-end;margin-top:8px}
.dn-save{background:#111;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:inherit}

/* SECTION HEADER */
.sl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#aaa;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sl-cnt{background:#f0ede8;border-radius:7px;padding:2px 8px;font-size:10px;letter-spacing:0;color:#888;font-weight:500}
.sl-right{display:flex;align-items:center;gap:6px;margin-left:auto}
.plus-btn{width:22px;height:22px;border-radius:50%;border:0.5px solid #e5e5e3;background:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:#888;line-height:1;flex-shrink:0}
.plus-btn:hover{background:#f5f4f0;color:#111;border-color:#aaa}
.slbtn{background:none;border:0.5px solid #e5e5e3;border-radius:7px;padding:4px 10px;font-size:11px;color:#888;cursor:pointer;font-family:inherit}
.slbtn:hover{background:#f5f4f0;color:#111}
.dv{height:0.5px;background:#e5e5e3;margin:1.5rem 0}

/* QUICK ADD FORMS */
.qa-form{background:#fff;border:0.5px solid #e5e5e3;border-radius:12px;padding:13px 14px;margin-bottom:10px}
.qa-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.qa-inp{flex:1;min-width:140px;border:0.5px solid #ddd;border-radius:8px;padding:8px 11px;font-size:13px;font-family:inherit;outline:none;background:#fff;color:#111}
.qa-inp:focus{border-color:#aaa}
.qa-sel{border:0.5px solid #ddd;border-radius:8px;padding:7px 9px;font-size:12px;font-family:inherit;outline:none;background:#fff;color:#111}
.qa-actions{display:flex;gap:7px}
.qa-save{background:#111;color:#fff;border:none;border-radius:8px;padding:7px 15px;font-size:12px;cursor:pointer;font-family:inherit}
.qa-cancel{background:none;border:0.5px solid #e5e5e3;border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;font-family:inherit;color:#888}

/* CALENDAR */
.cal-wrap{background:#fff;border:0.5px solid #e5e5e3;border-radius:16px;overflow:hidden;margin-bottom:1.25rem}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;border-bottom:0.5px solid #f0ede8}
.cal-nav{display:flex;align-items:center;gap:6px}
.cal-ttl{font-size:14px;font-weight:600;min-width:150px;text-align:center;color:#111}
.carr{background:none;border:0.5px solid #e5e5e3;border-radius:7px;width:28px;height:28px;cursor:pointer;font-size:13px;color:#888;font-family:inherit;display:flex;align-items:center;justify-content:center}
.carr:hover{background:#f5f4f0;color:#111}
.cv-row{display:flex;border:0.5px solid #e5e5e3;border-radius:9px;overflow:hidden}
.cv{background:none;border:none;padding:5px 10px;font-size:11px;font-weight:500;cursor:pointer;color:#888;font-family:inherit}
.cv.on{background:#111;color:#fff}

/* MONTH CALENDAR */
.mg{display:grid;grid-template-columns:repeat(7,1fr)}
.mdow{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#aaa;text-align:center;padding:9px 0 7px;border-bottom:0.5px solid #f0ede8}
.mc{border-right:0.5px solid #f0ede8;border-bottom:0.5px solid #f0ede8;padding:5px 5px;min-height:72px;cursor:pointer;transition:background .1s}
.mc:hover:not(.faded):not(.noev){background:#fafaf8}
.mc:nth-child(7n){border-right:none}
.mc.faded{opacity:.15;pointer-events:none}
.mc.today{background:#111}
.mc.noev{cursor:default}
.mn{font-size:12px;font-weight:500;color:#111;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:3px}
.mc.today .mn{color:#fff}
.mc.wkend .mn{color:#bbb}
.mev{font-size:8px;font-weight:500;padding:2px 4px;border-radius:3px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.35}
.mev.rec{background:#d1fae5;color:#065f46}
.mev.gc{background:#dbeafe;color:#1e40af}
.mev.cus{background:#fce7f3;color:#9d174d}
.mc.today .mev{background:rgba(255,255,255,.2);color:rgba(255,255,255,.9)}

/* TIME-SLOT CALENDAR (Day / 3-Day / Week) */
.ts-wrap{display:flex;overflow-y:auto;max-height:520px}
.ts-times{width:44px;flex-shrink:0}
.ts-hr-lbl{height:52px;display:flex;align-items:flex-start;padding:4px 6px 0;font-size:10px;color:#bbb;font-weight:500;border-bottom:0.5px solid #f0ede8}
.ts-cols{flex:1;display:grid}
.ts-col{border-left:0.5px solid #f0ede8;position:relative}
.ts-col-hdr{padding:8px 6px;text-align:center;border-bottom:0.5px solid #f0ede8;position:sticky;top:0;background:#fff;z-index:2}
.ts-col-hdr.today-hdr .ts-dn{background:#111;color:#fff}
.ts-dn{font-size:18px;font-weight:600;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 2px;color:#111}
.ts-dname{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#aaa}
.ts-cell{height:52px;border-bottom:0.5px solid #f0ede8;padding:2px 4px;position:relative}
.ts-ev{font-size:10px;font-weight:500;padding:3px 7px;border-radius:5px;margin-bottom:2px;line-height:1.35;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.ts-ev.rec{background:#d1fae5;color:#065f46}
.ts-ev.gc{background:#dbeafe;color:#1e40af}
.ts-ev.cus{background:#fce7f3;color:#9d174d}
.now-row{position:relative}
.now-line{position:absolute;left:0;right:0;top:0;height:1.5px;background:#dc2626;z-index:3}
.now-dot{position:absolute;left:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:#dc2626}

/* FOCUS */
.fw{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem}
.fcard{background:#111;border-radius:14px;padding:15px 17px}
.fcat{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.25);margin-bottom:7px}
.ftxt{font-size:14px;color:#fff;line-height:1.55;font-family:Georgia,serif}

/* HABITS */
.hab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px}
.hc{background:#fff;border:0.5px solid #e5e5e3;border-radius:13px;padding:12px 13px;cursor:pointer;transition:all .15s}
.hc:hover{border-color:#aaa}
.hc.done{background:#f0fdf4;border-color:#86efac}
.hc-name{font-size:13px;font-weight:500;color:#111;margin-bottom:3px}
.hc-streak{font-size:11px;color:#888;margin-bottom:9px}
.hc.done .hc-streak{color:#047857}
.hc-check{display:flex;align-items:center;gap:7px;font-size:12px;color:#888}
.hc-tick{width:22px;height:22px;border-radius:50%;border:1.5px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.hc.done .hc-tick{background:#111;border-color:#111;color:#fff}
.hc-exp{margin-top:10px;padding-top:10px;border-top:0.5px solid #e5e5e3}

/* TASKS */
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.col-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px}
.proj-g{margin-bottom:10px}
.proj-hdr{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pnm{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888}
.tcard{background:#fff;border:0.5px solid #e5e5e3;border-radius:12px;overflow:hidden}
.ti{display:flex;align-items:flex-start;gap:8px;padding:8px 11px;border-bottom:0.5px solid #f8f7f5;cursor:pointer;border-left:4px solid transparent;transition:background .1s}
.ti:last-of-type{border-bottom:none}
.ti:hover{background:#fafaf8}
.ti.pu{border-left-color:#dc2626;background:#fef9f9}.ti.pu:hover{background:#fef2f2}
.ti.ph{border-left-color:#ef4444}
.ti.pm{border-left-color:#f59e0b}
.ti.pl{border-left-color:#86efac}
.ti.ps{border-left-color:#e5e5e3;opacity:.5}
.ti input[type=checkbox]{width:14px;height:14px;margin-top:2px;flex-shrink:0;cursor:pointer;accent-color:#111}
.tit{font-size:12px;flex:1;line-height:1.45;word-break:break-word;color:#111}
.tit.dn{text-decoration:line-through;color:#ccc}
.ti-time{font-size:10px;color:#bbb;white-space:nowrap;margin-top:3px;flex-shrink:0}
.exp-p{padding:11px 13px;background:#fafaf8;border-bottom:0.5px solid #e5e5e3}
.exp-ta{width:100%;border:0.5px solid #ddd;border-radius:8px;padding:9px 11px;font-size:13px;font-family:inherit;resize:vertical;outline:none;background:#fff;color:#111;line-height:1.55;min-height:80px}
.exp-ta:focus{border-color:#aaa}
.exp-ta.xl{min-height:110px}
.inp-e{width:100%;border:0.5px solid #ddd;border-radius:8px;padding:8px 11px;font-size:13px;font-family:inherit;outline:none;background:#fff;color:#111;margin-bottom:7px;display:block}
.inp-e:focus{border-color:#aaa}
.pri-row{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;align-items:center}
.pri-lbl{font-size:11px;color:#888;flex-shrink:0;margin-right:2px}
.pb{border:none;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500;opacity:.3}
.pb.on{opacity:1}
.pu-b{background:#fef2f2;color:#991b1b}
.ph-b{background:#fff1f2;color:#be123c}
.pm-b{background:#fffbeb;color:#92400e}
.pl-b{background:#f0fdf4;color:#166534}
.ps-b{background:#f5f5f3;color:#888}
.exp-dt{font-size:11px;color:#bbb;margin-top:7px}
.sv-btn{background:#111;color:#fff;border:none;border-radius:8px;padding:7px 15px;font-size:12px;cursor:pointer;font-family:inherit;margin-top:9px}
.sv-btn:hover{opacity:.8}
.no-t{background:#fff;border:0.5px solid #e5e5e3;border-radius:12px;padding:14px;text-align:center;font-size:13px;color:#bbb}

/* PEOPLE */
.people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.person-card{background:#fff;border:0.5px solid #e5e5e3;border-radius:13px;padding:13px 15px;cursor:pointer;transition:border-color .15s;border-top:3px solid #6366f1}
.person-card:hover{border-color:#aaa}
.pc-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pc-avatar{width:38px;height:38px;border-radius:50%;background:#e0e7ff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:#4338ca;flex-shrink:0}
.pc-name{font-size:14px;font-weight:600;color:#111;line-height:1.2}
.pc-ctx{font-size:11px;color:#888;margin-top:1px}
.pc-last{font-size:11px;color:#bbb;margin-top:7px}
.pc-notes{margin-top:8px;padding-top:8px;border-top:0.5px solid #f0ede8}
.pc-note{font-size:12px;color:#888;line-height:1.5;margin-bottom:4px;display:flex;gap:6px}
.pc-note-date{font-size:10px;color:#ccc;flex-shrink:0;margin-top:1px}
.pc-exp{margin-top:10px;padding-top:10px;border-top:0.5px solid #e5e5e3}

/* BUILDS */
.bg-cols{columns:2;column-gap:11px}
.bc{background:#fff;border:0.5px solid #e5e5e3;border-radius:14px;padding:14px 15px;border-top:3px solid;break-inside:avoid;margin-bottom:11px;cursor:pointer;transition:border-color .15s}
.bc:hover{border-color:#aaa}
.bc.active{border-top-color:#be185d}
.bc.future{border-top-color:#7c3aed}
.bc.background{border-top-color:#e5e5e3}
.bc-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;margin-bottom:7px}
.bc.active .bc-tag{color:#be185d}
.bc.future .bc-tag{color:#7c3aed}
.bc.background .bc-tag{color:#aaa}
.bc-title{font-size:14px;font-weight:600;line-height:1.35;margin-bottom:7px;color:#111}
.bc-desc{font-size:13px;color:#888;line-height:1.6}
.bc-exp{margin-top:12px;padding-top:12px;border-top:0.5px solid #e5e5e3}
.st-row{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap}
.stb{border:none;border-radius:6px;padding:4px 9px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500;opacity:.3}
.stb.on{opacity:1}
.st-a{background:#fdf2f8;color:#9d174d}
.st-f{background:#f5f3ff;color:#5b21b6}
.st-b{background:#f5f5f3;color:#888}

/* LEARNING */
.lg{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
.lc{background:#fff;border:0.5px solid #e5e5e3;border-radius:13px;padding:13px 14px;border-left:3px solid #047857;cursor:pointer;transition:border-color .15s}
.lc:hover{border-color:#aaa}
.lsk{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#047857;margin-bottom:8px}
.lnum{font-size:28px;font-weight:600;line-height:1;margin-bottom:3px;color:#111}
.lnum.z{font-size:18px;color:#bbb}
.lunit{font-size:11px;color:#bbb;margin-bottom:8px}
.lnote{font-size:12px;color:#888;line-height:1.5;border-top:0.5px solid #f0ede8;padding-top:8px}
.l-exp{margin-top:10px;padding-top:10px;border-top:0.5px solid #e5e5e3}
.l-ctr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.l-adj{width:28px;height:28px;border:0.5px solid #e5e5e3;border-radius:7px;background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:#888;font-family:inherit;flex-shrink:0}
.l-adj:hover{background:#f5f4f0;color:#111}
.l-val{font-size:18px;font-weight:600;color:#111;min-width:32px;text-align:center}

/* IDEAS */
.idea-list{display:flex;flex-direction:column;gap:8px}
.ic{background:#fff;border:0.5px solid #e5e5e3;border-radius:12px;padding:12px 14px;display:flex;gap:11px;cursor:pointer;transition:border-color .15s}
.ic:hover{border-color:#aaa}
.ic-dot{width:7px;height:7px;border-radius:50%;background:#5b21b6;flex-shrink:0;margin-top:5px}
.ict{font-size:13px;font-weight:600;margin-bottom:3px;line-height:1.3;color:#111}
.icd{font-size:12px;color:#888;line-height:1.6}
.icdt{font-size:11px;color:#ddd;margin-top:4px}
.i-exp{margin-top:9px;padding-top:9px;border-top:0.5px solid #e5e5e3;width:100%}

/* RESOURCES */
.res-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:9px}
.rc{background:#fff;border:0.5px solid #e5e5e3;border-radius:12px;padding:12px 14px;cursor:pointer;border-left:3px solid #0891b2;transition:border-color .15s}
.rc:hover{border-color:#aaa}
.rc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
.rc-title{font-size:13px;font-weight:600;color:#111;line-height:1.3}
.rc-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:2px 6px;border-radius:4px;background:#e0f2fe;color:#075985;flex-shrink:0}
.rc-desc{font-size:12px;color:#888;line-height:1.5;margin-bottom:5px}
.rc-url{font-size:11px;color:#0891b2;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;display:block;text-decoration:none}
.rc-url:hover{text-decoration:underline}
.r-exp{margin-top:9px;padding-top:9px;border-top:0.5px solid #e5e5e3}

/* KNOWLEDGE VAULT */
.nl{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:9px}
.nc{background:#fff;border:0.5px solid #e5e5e3;border-radius:12px;padding:12px 14px;border-left:3px solid #ddd;cursor:pointer;transition:border-color .15s}
.nc:hover{border-color:#aaa}
.nct{font-size:13px;font-weight:600;color:#111;margin-bottom:4px}
.ncb{font-size:12px;color:#888;line-height:1.6}
.n-exp{margin-top:9px;padding-top:9px;border-top:0.5px solid #e5e5e3}

/* BOTTOM BAR */
.btm{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #e5e5e3;padding:10px 1.25rem env(safe-area-inset-bottom,10px);z-index:10}
.btm-inn{max-width:1140px;margin:0 auto;display:flex;gap:8px;align-items:flex-end}
.mic-btn{width:42px;height:42px;border-radius:50%;border:0.5px solid #e5e5e3;background:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;color:#888}
.mic-btn:hover{border-color:#aaa;color:#111}
.mic-btn.on{background:#dc2626;border-color:#dc2626;color:#fff;animation:pulse-mic .9s infinite}
@keyframes pulse-mic{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.35)}50%{box-shadow:0 0 0 6px rgba(220,38,38,0)}}
.btm-ta{flex:1;border:1.5px solid #e5e5e3;border-radius:13px;padding:10px 14px;font-size:14px;font-family:inherit;outline:none;resize:none;min-height:42px;max-height:90px;overflow-y:auto;color:#111;background:#fafaf8;line-height:1.45;transition:border-color .15s}
.btm-ta::placeholder{color:#bbb}
.btm-ta:focus{border-color:#111;background:#fff}
.btm-btn{background:#111;color:#fff;border:none;border-radius:11px;padding:10px 18px;font-size:14px;font-family:inherit;cursor:pointer;font-weight:500;white-space:nowrap;flex-shrink:0;transition:opacity .15s}
.btm-btn:hover{opacity:.8}
.btm-btn:disabled{opacity:.3;cursor:not-allowed}
.btm-st{max-width:1140px;margin:4px auto 0;font-size:11px;color:#bbb;text-align:right;min-height:14px}

<script src="config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const AK='los_ak',getKey=()=>localStorage.getItem(AK);
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth(),db=firebase.firestore();
let CU=null,ST=null,SP=null;

auth.onAuthStateChanged(u=>{
  if(u){CU=u;document.getElementById('login').style.display='none';['topbar','scroll','btm'].forEach(i=>{const el=document.getElementById(i);if(el)el.style.display=i==='topbar'?'flex':'block';});SP=document.getElementById('sp');loadData();}
  else{CU=null;document.getElementById('login').style.display='flex';['topbar','scroll','btm'].forEach(i=>{const el=document.getElementById(i);if(el)el.style.display='none';});}
});

// GOOGLE CALENDAR SETUP
let gTok=null;let gcCache={key:'',events:[]};
function signInGoogle(){
  const p=new firebase.auth.GoogleAuthProvider();
  p.addScope('https://www.googleapis.com/auth/calendar');
  auth.signInWithPopup(p).then(r=>{if(r.credential?.accessToken){gTok=r.credential.accessToken;try{sessionStorage.setItem('los_gat',gTok);}catch(e){}}}).catch(e=>alert('Sign in failed: '+e.message));
}
function doSignOut(){if(confirm('Sign out?'))auth.signOut();}
async function ensureGTok(){
  if(gTok)return gTok;
  try{const s=sessionStorage.getItem('los_gat');if(s){gTok=s;return gTok;}}catch(e){}
  const p=new firebase.auth.GoogleAuthProvider();p.addScope('https://www.googleapis.com/auth/calendar');
  try{const r=await auth.currentUser.reauthenticateWithPopup(p);if(r.credential?.accessToken){gTok=r.credential.accessToken;try{sessionStorage.setItem('los_gat',gTok);}catch(e){}return gTok;}}catch(e){console.warn('GCal token',e);}return null;
}
async function fetchGCal(start,end){
  const tok=await ensureGTok();if(!tok)return[];
  const r=await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(start)}&timeMax=${encodeURIComponent(end)}&singleEvents=true&orderBy=startTime&maxResults=100`,{headers:{Authorization:'Bearer '+tok}});
  if(r.status===401){gTok=null;try{sessionStorage.removeItem('los_gat');}catch(e){}return fetchGCal(start,end);}
  if(!r.ok)return[];
  const d=await r.json();
  return(d.items||[]).map(ev=>({id:ev.id,title:ev.summary||'(No title)',date:(ev.start.dateTime||ev.start.date||'').slice(0,10),time:ev.start.dateTime?ev.start.dateTime.slice(11,16):'',allDay:!!ev.start.date,gcal:true}));
}
async function getGCForMonth(y,m){
  const key=`${y}-${m}`;if(gcCache.key===key)return gcCache.events;
  const s=new Date(y,m,1).toISOString(),e=new Date(y,m+1,1).toISOString();
  const evs=await fetchGCal(s,e);gcCache={key,events:evs};return evs;
}
async function createGCEvent(title,date,time,desc=''){
  const tok=await ensureGTok();if(!tok)return;
  const tz='Africa/Johannesburg';
  let body;
  if(time){const hh=p2hhmm(time);body={summary:title,description:desc,start:{dateTime:`${date}T${hh}:00`,timeZone:tz},end:{dateTime:`${date}T${endHH(hh)}:00`,timeZone:tz}};}
  else{body={summary:title,start:{date},end:{date}};}
  const r=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{method:'POST',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(r.ok){gcCache={key:'',events:[]};}
}
function p2hhmm(s){const m=(s||'').match(/(\d+)(?::(\d+))?\s*(am|pm)/i);if(!m)return'10:00';let h=parseInt(m[1]),min=parseInt(m[2]||'0');if(m[3].toLowerCase()==='pm'&&h!==12)h+=12;if(m[3].toLowerCase()==='am'&&h===12)h=0;return`${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`;}
function endHH(hh){const[h,m]=hh.split(':').map(Number);const eh=(h+1)%24;return`${String(eh).padStart(2,'0')}:${String(m).padStart(2,'0')}`;}

async function loadData(){
  try{
    const doc=await db.collection('users').doc(CU.uid).collection('data').doc('main').get();
    if(doc.exists){const d=doc.data();['tasks','builds','learning','ideas','notes','customEvents','habits','resources','people'].forEach(k=>{if(d[k])S[k]=d[k];});S.dayNotes=d.dayNotes||{};if(!getKey()&&d.ak)localStorage.setItem(AK,d.ak);}
    else seed();
    render();loadDailyNote();
    if(!getKey())promptKey();
  }catch(e){console.error(e);}
}
function svAll(){
  if(!CU)return;clearTimeout(ST);
  ST=setTimeout(async()=>{
    try{await db.collection('users').doc(CU.uid).collection('data').doc('main').set({tasks:S.tasks,builds:S.builds,learning:S.learning,ideas:S.ideas,notes:S.notes,customEvents:S.customEvents||[],habits:S.habits||[],resources:S.resources||[],people:S.people||[],dayNotes:S.dayNotes||{},updatedAt:firebase.firestore.FieldValue.serverTimestamp()});if(SP){SP.classList.add('show');setTimeout(()=>SP.classList.remove('show'),1500);}}catch(e){console.error(e);}},1500);
}
function promptKey(){const k=prompt('Enter your Anthropic API key to enable AI updates\n(get yours free at console.anthropic.com → API Keys):');if(k?.trim()){localStorage.setItem(AK,k.trim());db.collection('users').doc(CU.uid).collection('data').doc('main').update({ak:k.trim()}).catch(()=>{});}}

// DATA
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const SCHED={0:['Church 9–11am'],1:['Bible studies 7–9pm'],2:['Community 7–9pm'],3:['Community 7–9pm'],4:['Young Adults 6–9pm'],5:['Youth @ Josh Jen 7–9pm'],6:[]};
const PROJ={wa:{n:'WebAnchor',h:'#1d4ed8'},tf:{n:'TriFusion',h:'#7c3aed'},zm:{n:'Zomarka',h:'#0891b2'},gen:{n:'General',h:'#dc2626'}};
const PO={urgent:0,hi:1,med:2,lo:3,someday:4};
const GROWTH={'Core Principles':['Keep promises to yourself','Act the same in private as in public','Finish what you start consistently','Align daily actions with your future self','Take full responsibility without blaming others'],'Discipline':['Wake up at a consistent time','Do tasks even when you don\'t feel like it','Be comfortable being bored','Show up on low-motivation days','Stay consistent on weekends'],'Integrity':['Close the gap between who you are and who you say you are','Be honest with yourself','Stand up for what is right','Take ownership of mistakes quickly'],'Boundaries':['Say no without over-explaining','Be okay with disappointing people','Handle conflict instead of avoiding it','Respect your own time and energy'],'Communication':['Listen to understand not to reply','Speak clearly and concisely','Give honest feedback respectfully','Build deeper more meaningful conversations'],'Emotional Maturity':['Accept correction without ego','Stay calm under pressure','Be slow to anger','Build emotional resilience'],'Faith':['Let your faith shape your actions','Seek God first not as a backup','Be intentional in prayer and Scripture','Practice faith under pressure not just in comfort'],'Growth & Money':['Delay gratification financially','Be intentional with spending','Invest in personal growth','Seek mentorship actively']};
const S={tasks:[],builds:[],learning:[],ideas:[],notes:[],customEvents:[],habits:[],resources:[],people:[],dayNotes:{}};
const UI={calView:'day',calDate:new Date()};
let ex={id:null,type:null};
const uid=()=>Math.random().toString(36).slice(2,9);
const tod=()=>new Date().toISOString().slice(0,10);
const yest=()=>{const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);};
const fmt=d=>{try{return new Date(d+'T12:00:00').toLocaleDateString('en-ZA',{day:'numeric',month:'short'});}catch(e){return d;}};
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const gTxt=()=>{const h=new Date().getHours();return h<12?'Good morning, Zander.':h<17?'Good afternoon, Zander.':'Good evening, Zander.';};
const dTxt=()=>new Date().toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
function bump(l){const t=tod(),y=yest();if(l.lastDate===t)return;l.streak=(l.lastDate===y)?(l.streak||0)+1:1;l.lastDate=t;l.total=(l.total||0)+1;}
function bumpH(h){const t=tod(),y=yest();if(h.lastDate===t){h.doneToday=true;return;}h.streak=(h.lastDate===y)?(h.streak||0)+1:1;h.lastDate=t;h.total=(h.total||0)+1;h.doneToday=true;}

// VOICE INPUT
const SpeechRec=window.SpeechRecognition||window.webkitSpeechRecognition;
let recognition=null,isListening=false;
function toggleVoice(){
  if(!SpeechRec){alert('Voice input not supported in this browser. Try Chrome or Edge.');return;}
  if(isListening){recognition?.stop();return;}
  recognition=new SpeechRec();
  recognition.continuous=false;recognition.interimResults=true;recognition.lang='en-ZA';
  const ta=document.getElementById('ai-ta'),btn=document.getElementById('mic-btn'),st=document.getElementById('btm-st');
  recognition.onstart=()=>{isListening=true;btn.classList.add('on');st.textContent='Listening... speak now';st.className='btm-st';};
  recognition.onresult=e=>{const t=[...e.results].map(r=>r[0].transcript).join('');ta.value=t;ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,90)+'px';};
  recognition.onend=()=>{isListening=false;btn.classList.remove('on');st.className='btm-st';st.textContent=ta.value.trim()?'Review your message, then press Enter or Update ↗':'';};
  recognition.onerror=e=>{isListening=false;btn.classList.remove('on');if(e.error!=='aborted'&&e.error!=='no-speech'){st.className='btm-st er';st.textContent='Voice error: '+e.error;}};
  recognition.start();
}

// FOCUS
function getDailyFocus(){const t=tod();try{const r=JSON.parse(localStorage.getItem('lf_f'));if(r&&r.date===t)return r.items;}catch(e){}return genFocus(t,0);}
function genFocus(t,off){const cats=Object.keys(GROWTH),h=t.split('').reduce((a,b)=>a+b.charCodeAt(0),0)+(off||0),i1=h%cats.length,i2=(h+3)%cats.length;const f=[{text:GROWTH[cats[i1]][h%GROWTH[cats[i1]].length],cat:cats[i1]},{text:GROWTH[cats[i2]][(h+1)%GROWTH[cats[i2]].length],cat:cats[i2]}];try{localStorage.setItem('lf_f',JSON.stringify({date:t,items:f,off:off||0}));}catch(e){}return f;}
function doRefreshFocus(){const t=tod();let off=0;try{const r=JSON.parse(localStorage.getItem('lf_f'));if(r&&r.date===t)off=(r.off||0)+7;}catch(e){}genFocus(t,off);rFocus();}

// CALENDAR HELPERS
function getCusDate(ds){return(S.customEvents||[]).filter(e=>e.date===ds);}
function getCusMon(y,m){return(S.customEvents||[]).filter(e=>{const d=new Date(e.date+'T12:00:00');return d.getFullYear()===y&&d.getMonth()===m;});}
function parseH(s){const m=(s||'').match(/(\d+)\s*(am|pm)/i);if(!m)return null;let h=parseInt(m[1]);if(m[2].toLowerCase()==='pm'&&h!==12)h+=12;if(m[2].toLowerCase()==='am'&&h===12)h=0;return h;}
function parseHfromHHMM(s){if(!s)return null;return parseInt((s||'00:00').split(':')[0]);}
function fmtH(h){if(h===null||h===undefined)return'';const a=h>=12?'pm':'am';const d=h>12?h-12:(h===0?12:h);return`${d}${a}`;}
function rUpcom(){
  const today=new Date(),out=[];
  const chk=(name,ts)=>{const h=parseH(ts);if(h===null)return;const s=new Date(today);s.setHours(h,0,0,0);const d=s-Date.now();if(d>0&&d<7200000){const m=Math.round(d/60000);out.push(m<60?`${name} in ${m} min`:`${name} in ~${Math.round(d/3600000)}h`);}};
  (SCHED[today.getDay()]||[]).forEach(e=>chk(e.split(' ')[0],e));
  getCusDate(tod()).forEach(e=>chk(e.title,e.time));
  document.getElementById('upcom-area').innerHTML=out.map(t=>`<div class="upcom"><span class="u-dot"></span><div class="u-txt">${esc(t)}</div></div>`).join('');
}

function getCalTitle(){
  const d=UI.calDate,y=d.getFullYear(),m=d.getMonth();
  if(UI.calView==='month')return d.toLocaleDateString('en-ZA',{month:'long',year:'numeric'});
  if(UI.calView==='day')return d.toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long'});
  if(UI.calView==='3day'){const e=new Date(d);e.setDate(d.getDate()+2);return`${d.getDate()} ${d.toLocaleDateString('en-ZA',{month:'short'})} – ${e.getDate()} ${e.toLocaleDateString('en-ZA',{month:'short'})}`;}
  const s=new Date(d);s.setDate(d.getDate()-d.getDay());const e=new Date(s);e.setDate(s.getDate()+6);return`${s.getDate()} ${s.toLocaleDateString('en-ZA',{month:'short'})} – ${e.getDate()} ${e.toLocaleDateString('en-ZA',{month:'short'})}`;
}
function calNav(dir){

}

// Build time-slot columns for a set of dates
function buildTimeSlotCols(dates,gcEvs){
  const HOURS=Array.from({length:19},(_,i)=>i+5); // 5am to 11pm
  const now=new Date(),todayStr=tod();
  const nowH=now.getHours(),nowM=now.getMinutes();
  const nowFrac=nowH+(nowM/60);

  // Gather events per date
  const evsByDate={};
  dates.forEach(({date,ds})=>{
    const re=SCHED[date.getDay()]||[];
    const ce=getCusDate(ds);
    const gc=(gcEvs||[]).filter(e=>e.date===ds);
    const all=[
      ...re.map(t=>({title:t,h:parseH(t),cls:'rec'})),
      ...gc.map(e=>({title:(e.time?e.time.slice(0,5)+' ':'')+e.title,h:parseHfromHHMM(e.time),cls:'gc'})),
      ...ce.map(e=>({title:(e.time?e.time+' ':'')+e.title,h:parseH(e.time),cls:'cus'}))
    ];
    evsByDate[ds]=all;
  });

  const numCols=dates.length;
  let h=`<div class="ts-wrap"><div class="ts-times">`;
  // Time labels column
  h+=`<div style="height:52px;border-bottom:0.5px solid #f0ede8"></div>`; // header spacer
  HOURS.forEach(hr=>{h+=`<div class="ts-hr-lbl">${hr>12?hr-12:(hr===0?12:hr)}${hr>=12?'pm':'am'}</div>`;});
  h+=`</div><div class="ts-cols" style="grid-template-columns:repeat(${numCols},1fr)">`;

  dates.forEach(({date,ds,isToday})=>{
    const dname=DAYS[date.getDay()];
    const dnum=date.getDate();
    h+=`<div class="ts-col">`;
    h+=`<div class="ts-col-hdr${isToday?' today-hdr':''}"><div class="ts-dname">${dname}</div><div class="ts-dn">${dnum}</div></div>`;
    const evs=evsByDate[ds]||[];
    HOURS.forEach((hr,hi)=>{
      const evHere=evs.filter(e=>e.h===hr);
      const isNowRow=isToday&&nowH===hr;
      const pct=Math.round((nowM/60)*100);
      h+=`<div class="ts-cell${isNowRow?' now-row':''}">`;
      if(isNowRow)h+=`<div class="now-line" style="top:${pct}%"><div class="now-dot"></div></div>`;
      evHere.forEach(ev=>{h+=`<div class="ts-ev ${ev.cls}">${esc(ev.title)}</div>`;});
      h+=`</div>`;
    });
    h+=`</div>`;
  });
  h+=`</div></div>`;
  return h;
}

async function rCal(){
  document.getElementById('cal-ttl').textContent=getCalTitle();
  document.querySelectorAll('.cv').forEach((b,i)=>b.classList.toggle('on',['day','3day','week','month'][i]===UI.calView));
  const el=document.getElementById('cal'),today=new Date(),todayStr=tod();
  const y=UI.calDate.getFullYear(),m=UI.calDate.getMonth();
  let gcEvs=[];try{gcEvs=await getGCForMonth(y,m);}catch(e){}
  const gcForDate=ds=>(gcEvs||[]).filter(e=>e.date===ds);

  if(UI.calView==='day'){
    const ds=UI.calDate.toISOString().slice(0,10);
    const isToday=UI.calDate.toDateString()===today.toDateString();
    const dates=[{date:UI.calDate,ds,isToday}];
    el.innerHTML=buildTimeSlotCols(dates,gcEvs);
    // Day notes below
    const note=(S.dayNotes||{})[ds]||'';
    el.innerHTML+=`<div style="padding:13px 15px;border-top:0.5px solid #f0ede8"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#bbb;margin-bottom:7px">Notes for this day</div><textarea class="exp-ta xl" id="dv-ta" placeholder="Notes, intentions...">${esc(note)}</textarea><button class="sv-btn" onclick="saveDvNote()" style="margin-top:8px">Save note</button></div>`;
    el.onclick=null;

  } else if(UI.calView==='3day'){
    const dates=Array.from({length:3},(_,i)=>{const d=new Date(UI.calDate);d.setDate(UI.calDate.getDate()+i);return{date:d,ds:d.toISOString().slice(0,10),isToday:d.toDateString()===today.toDateString()};});
    el.innerHTML=buildTimeSlotCols(dates,gcEvs);
    el.onclick=null;

  } else if(UI.calView==='week'){
    const s=new Date(UI.calDate);s.setDate(UI.calDate.getDate()-UI.calDate.getDay());
    const dates=Array.from({length:7},(_,i)=>{const d=new Date(s);d.setDate(s.getDate()+i);return{date:d,ds:d.toISOString().slice(0,10),isToday:d.toDateString()===today.toDateString()};});
    el.innerHTML=buildTimeSlotCols(dates,gcEvs);
    el.onclick=null;

  } else {
    // MONTH
    const first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),cevs=getCusMon(y,m);
    let h='<div class="mg">'+['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="mdow">${d}</div>`).join('');
    for(let i=0;i<first;i++)h+=`<div class="mc faded"></div>`;
    for(let d=1;d<=days;d++){
      const dow=(first+d-1)%7,ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const re=SCHED[dow]||[],ce=cevs.filter(e=>e.date===ds),gc=gcForDate(ds);
      const isT=today.getDate()===d&&today.getMonth()===m&&today.getFullYear()===y;
      const isW=dow===0||dow===6;
      h+=`<div class="mc${isT?' today':''}${isW?' wkend':''}${!re.length&&!ce.length&&!gc.length?' noev':''}" data-cd="${y},${m},${d}">
        <div class="mn">${d}</div>
        ${re.map(e=>`<div class="mev rec">${esc(e.split(' ')[0])}</div>`).join('')}
        ${gc.slice(0,2).map(e=>`<div class="mev gc">${esc(e.title)}</div>`).join('')}
        ${gc.length>2?`<div class="mev gc">+${gc.length-2}</div>`:''}
        ${ce.map(e=>`<div class="mev cus">${esc(e.title)}</div>`).join('')}
      </div>`;
    }
    el.innerHTML=h+'</div>';
    el.onclick=e=>{const c=e.target.closest('[data-cd]');if(!c)return;const[y,m,d]=c.dataset.cd.split(',').map(Number);UI.calDate=new Date(y,m,d);UI.calView='day';rCal();};
  }
}

function rBuilds(){

  const sorted=[...S.builds].sort((a,b)=>(order[a.status]||1)-(order[b.status]||1));

}

// LEARNING — with manual +/- controls
function adjLearn(id,dir){const l=S.learning.find(x=>x.id===id);if(!l)return;if(dir>0){bump(l);}else{l.total=Math.max(0,(l.total||1)-1);l.streak=Math.max(0,(l.streak||0)-(l.lastDate===tod()?1:0));if(l.lastDate===tod())l.lastDate=yest();}svAll();rLearn();}
function saveLearn(id){const l=S.learning.find(x=>x.id===id);if(!l)return;const ta=document.getElementById('l-n-'+id);if(ta?.value?.trim()){l.note=ta.value.trim();l.entries=l.entries||[];l.entries.push({date:tod(),content:ta.value.trim()});}svAll();ex={id:null,type:null};rLearn();}
function rLearn(){document.getElementById('learn').innerHTML=S.learning.map(l=>{const isEx=ex.id===l.id&&ex.type==='learn';const n=l.streak>0?l.streak:l.total||null,u=n!==null?(l.streak>=1?'day streak':'total sessions'):'';const note=l.entries?.slice(-1)[0]?.content||l.note||'';return`<div class="lc" onclick="toggleEx('learn','${l.id}')"><div class="lsk">${esc(l.skill)}</div><div class="lnum${n===null?' z':''}">${n!==null?n:'—'}</div><div class="lunit">${u||'Not started yet'}</div><div class="lnote">${esc(note||'Click to update')}</div>${isEx?`<div class="l-exp" onclick="event.stopPropagation()"><div class="l-ctr"><button class="l-adj" onclick="adjLearn('${l.id}',-1)">−</button><span class="l-val">${l.total||0}</span><button class="l-adj" onclick="adjLearn('${l.id}',1)">+</button><span style="font-size:11px;color:#bbb;margin-left:4px">sessions</span></div><textarea class="exp-ta xl" id="l-n-${l.id}" rows="4" placeholder="What did you practice or learn?">${esc(note)}</textarea><button class="sv-btn" onclick="saveLearn('${l.id}')">Save note</button></div>`:''}</div>`;}).join('');}

// IDEAS
function saveIdea(id){const i=S.ideas.find(x=>x.id===id);if(!i)return;const ti=document.getElementById('i-t-'+id),de=document.getElementById('i-d-'+id);if(ti?.value?.trim())i.title=ti.value.trim();if(de?.value?.trim())i.desc=de.value.trim();svAll();ex={id:null,type:null};rIdeas();}
function rIdeas(){document.getElementById('ic-cnt').textContent=S.ideas.length;document.getElementById('ideas').innerHTML=[...S.ideas].reverse().map(i=>{const isEx=ex.id===i.id&&ex.type==='idea';return`<div class="ic" onclick="toggleEx('idea','${i.id}')"><span class="ic-dot"></span><div style="flex:1"><div class="ict">${esc(i.title)}</div>${i.desc?`<div class="icd">${esc(i.desc)}</div>`:''}<div class="icdt">${fmt(i.date)}</div>${isEx?`<div class="i-exp" onclick="event.stopPropagation()"><input class="inp-e" id="i-t-${i.id}" value="${esc(i.title)}"><textarea class="exp-ta xl" id="i-d-${i.id}" rows="4">${esc(i.desc)}</textarea><button class="sv-btn" onclick="saveIdea('${i.id}')">Save &amp; close</button></div>`:''}</div></div>`;}).join('');}

// RESOURCES
function saveRes(id){const r=S.resources.find(x=>x.id===id);if(!r)return;const ti=document.getElementById('r-t-'+id),de=document.getElementById('r-d-'+id),ur=document.getElementById('r-u-'+id);if(ti?.value?.trim())r.title=ti.value.trim();if(de?.value?.trim())r.desc=de.value.trim();if(ur)r.url=ur.value.trim();svAll();ex={id:null,type:null};rResources();}
function rResources(){document.getElementById('rc-cnt').textContent=S.resources.length;document.getElementById('resources').innerHTML=S.resources.length?[...S.resources].reverse().map(r=>{const isEx=ex.id===r.id&&ex.type==='resource';return`<div class="rc" onclick="toggleEx('resource','${r.id}')"><div class="rc-top"><div class="rc-title">${esc(r.title)}</div>${r.tag?`<span class="rc-tag">${esc(r.tag)}</span>`:''}</div>${r.desc?`<div class="rc-desc">${esc(r.desc)}</div>`:''} ${r.url?`<a class="rc-url" href="${esc(r.url)}" target="_blank" onclick="event.stopPropagation()">${esc(r.url)}</a>`:''} ${isEx?`<div class="r-exp" onclick="event.stopPropagation()"><input class="inp-e" id="r-t-${r.id}" value="${esc(r.title)}"><input class="inp-e" id="r-u-${r.id}" value="${esc(r.url||'')}" placeholder="URL"><textarea class="exp-ta" id="r-d-${r.id}" rows="3">${esc(r.desc||'')}</textarea><button class="sv-btn" onclick="saveRes('${r.id}')">Save &amp; close</button></div>`:''}</div>`;}).join(''):`<div class="no-t">No resources yet — save links, articles, tools worth revisiting</div>`;}

// NOTES

// AI UPDATE
async function doUpdate(){
  const ta=document.getElementById('ai-ta'),msg=ta.value.trim();if(!msg)return;
  const btn=document.getElementById('btm-btn'),st=document.getElementById('btm-st');
  const key=getKey();if(!key){promptKey();return;}
  btn.disabled=true;btn.textContent='Thinking...';st.className='btm-st';st.textContent='';
  const ctx={
    tasks:S.tasks.filter(t=>!t.done).map(t=>({id:t.id,text:t.text,area:t.area,project:t.project,priority:t.priority})),
    habits:S.habits.map(h=>({id:h.id,name:h.name,streak:h.streak,doneToday:h.doneToday})),
    people:S.people.map(p=>({id:p.id,name:p.name,context:p.context})),
    builds:S.builds.map(b=>({id:b.id,title:b.title,status:b.status})),
    learning:S.learning.map(l=>({id:l.id,skill:l.skill,streak:l.streak,total:l.total})),
    ideas:S.ideas.map(i=>({id:i.id,title:i.title})),
    resources:S.resources.map(r=>({id:r.id,title:r.title})),
    notes:S.notes.map(n=>({id:n.id,title:n.title}))
  };
  const prompt=`You manage Zander's Life OS. Entrepreneur, Cape Town SA. Work > personal. Today: ${tod()}.
Respond ONLY raw JSON:
{"addTasks":[{"text":"...","area":"work|personal","project":"wa|tf|zm|gen","priority":"urgent|hi|med|lo|someday","scheduledTime":"10am|optional"}],"completeTasks":["partial"],"removeTasks":["partial"],"addHabits":[{"name":"..."}],"completeHabits":["partial name"],"addPerson":[{"name":"...","context":"...","note":"..."}],"updatePerson":[{"name":"partial","note":"..."}],"addBuild":[{"title":"...","desc":"...","status":"active|future|background"}],"logLearning":[{"skill":"...","content":"...","type":"session|note"}],"addIdea":[{"title":"...","desc":"..."}],"addResource":[{"title":"...","url":"...","desc":"...","tag":"article|tool|video|book|person|other"}],"addNote":[{"title":"...","body":"..."}],"addEvent":[{"date":"YYYY-MM-DD","time":"10am","title":"..."}],"message":"1 sentence"}
State:${JSON.stringify(ctx)}
Zander:"${msg}"`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:prompt}]})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    const ch=JSON.parse((data.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim());
    applyChanges(ch);
    st.className='btm-st ok';st.textContent=ch.message||'Done!';
    ta.value='';ta.style.height='auto';
    setTimeout(()=>{st.textContent='';st.className='btm-st';},7000);
  }catch(e){st.className='btm-st er';st.textContent='Error: '+e.message;}
  btn.disabled=false;btn.textContent='Update ↗';
}

function applyChanges(ch){
  if(ch.addTasks?.length)ch.addTasks.forEach(t=>S.tasks.push({id:uid(),text:t.text,area:t.area||'personal',project:t.project||'gen',priority:t.priority||'lo',scheduledTime:t.scheduledTime||'',done:false,date:tod()}));
  if(ch.completeTasks?.length)ch.completeTasks.forEach(r=>{const t=S.tasks.find(x=>x.text.toLowerCase().includes((r||'').toLowerCase()));if(t)t.done=true;});
  if(ch.removeTasks?.length)ch.removeTasks.forEach(r=>{const t=S.tasks.find(x=>x.text.toLowerCase().includes((r||'').toLowerCase()));if(t)S.tasks=S.tasks.filter(x=>x.id!==t.id);});
  if(ch.addHabits?.length)ch.addHabits.forEach(h=>S.habits.push({id:uid(),name:h.name,streak:0,lastDate:null,total:0,doneToday:false}));
  if(ch.completeHabits?.length)ch.completeHabits.forEach(r=>{const h=S.habits.find(x=>x.name.toLowerCase().includes((r||'').toLowerCase()));if(h&&!h.doneToday)bumpH(h);});
  if(ch.addPerson?.length)ch.addPerson.forEach(p=>{const exists=S.people.find(x=>x.name.toLowerCase()===p.name.toLowerCase());if(exists){if(p.note)exists.notes.push({date:tod(),text:p.note});exists.lastSeen=tod();}else{S.people.push({id:uid(),name:p.name,context:p.context||'',notes:p.note?[{date:tod(),text:p.note}]:[],lastSeen:tod(),date:tod()});}});
  if(ch.updatePerson?.length)ch.updatePerson.forEach(u=>{const p=S.people.find(x=>x.name.toLowerCase().includes((u.name||'').toLowerCase()));if(p&&u.note){p.notes.push({date:tod(),text:u.note});p.lastSeen=tod();}});
  if(ch.addBuild?.length)ch.addBuild.forEach(b=>S.builds.push({id:uid(),title:b.title,desc:b.desc||'',status:b.status||'future',date:tod()}));
  if(ch.logLearning?.length)ch.logLearning.forEach(lg=>{let l=S.learning.find(x=>x.skill.toLowerCase().includes((lg.skill||'').toLowerCase()));if(!l){l={id:uid(),skill:lg.skill,streak:0,lastDate:null,total:0,note:'',entries:[]};S.learning.push(l);}if(lg.type==='session')bump(l);l.entries=l.entries||[];if(lg.content)l.entries.push({date:tod(),content:lg.content});});
  if(ch.addIdea?.length)ch.addIdea.forEach(i=>S.ideas.push({id:uid(),title:i.title,desc:i.desc||'',date:tod()}));
  if(ch.addResource?.length)ch.addResource.forEach(r=>S.resources.push({id:uid(),title:r.title,url:r.url||'',desc:r.desc||'',tag:r.tag||'other',date:tod()}));
  if(ch.addNote?.length)ch.addNote.forEach(n=>S.notes.push({id:uid(),title:n.title,body:n.body,date:tod()}));
  if(ch.addEvent?.length){S.customEvents=S.customEvents||[];ch.addEvent.forEach(async e=>{S.customEvents.push({id:uid(),date:e.date,time:e.time||'',title:e.title});try{await createGCEvent(e.title,e.date,e.time||'');gcCache={key:'',events:[]};}catch(err){console.warn('GCal',err);}});}
  svAll();render();
}

function render(){
  const g=document.getElementById('gr'),d=document.getElementById('ds'),td=document.getElementById('t-date');
  if(g)g.textContent=gTxt();if(d)d.textContent=dTxt();if(td)td.textContent=dTxt();
  rUpcom();rCal();rFocus();rHabits();rTasks();rPeople();rBuilds();rLearn();rIdeas();rResources();rNotes();
}
